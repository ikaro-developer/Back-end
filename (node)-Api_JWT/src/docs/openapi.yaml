openapi: 3.0.0
info:
  title: API Node + TypeScript
  description: API de gerenciamento de usuários, autenticação, tags e elogios
  version: 1.0.0

servers:
  - url: http://localhost:3333

tags:
  - name: Users
    description: Gerenciamento de usuários

  - name: Auth
    description: Autenticação

  - name: Tags
    description: Gerenciamento de tags

  - name: Compliments
    description: Envio e consulta de elogios entre usuários

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:

  /users:
    post:
      summary: Criar usuário
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
                - admin
              properties:
                name:
                  type: string
                  example: João Silva
                email:
                  type: string
                  example: joao@email.com
                password:
                  type: string
                  example: "123456"
                admin:
                  type: boolean
                  example: false
      responses:
        200:
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                  email:
                    type: string
                  admin:
                    type: boolean
                  created_at:
                    type: string

  /login:
    post:
      summary: Autenticar usuário
      description: Retorna um token JWT
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: "user@email.com"
                password:
                  type: string
                  example: "123456"
      responses:
        200:
          description: Login realizado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      email:
                        type: string
                      admin:
                        type: boolean
                  token:
                    type: string
                    example: "jwt-token"

  /tags:
    post:
      summary: Criar tag
      tags:
        - Tags
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: liderança
      responses:
        200:
          description: Tag criada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  name:
                    type: string
                

    /tags:
    get:
      summary: Listar todas as tags
      description: Retorna todas as tags cadastradas no sistema
      tags:
        - Tags
      security:
        - bearerAuth: []
      responses:
        200:
          description: Lista de tags
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      example: "uuid-tag"
                    name:
                      type: string
                      example: liderança
        401:
          description: Token inválido ou não informado

  /compliments:
    post:
      summary: Enviar elogio
      tags:
        - Compliments
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_receiver
                - tag_id
                - message
              properties:
                user_receiver:
                  type: string
                tag_id:
                  type: string
                message:
                  type: string
      responses:
        200:
          description: Elogio enviado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  message:
                    type: string
                  user_sender:
                    type: string
                  user_receiver:
                    type: string
                  tag_id:
                    type: string
                  created_at:
                    type: string

  /user/compliments/send:
    get:
      summary: Listar elogios enviados
      tags:
        - Compliments
      security:
        - bearerAuth: []
      responses:
        200:
          description: Lista de elogios enviados
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    message:
                      type: string
                    created_at:
                      type: string

  /user/compliments/receive:
    get:
      summary: Listar elogios recebidos
      tags:
        - Compliments
      security:
        - bearerAuth: []
      responses:
        200:
          description: Lista de elogios recebidos
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    message:
                      type: string
                    created_at:
                      type: string