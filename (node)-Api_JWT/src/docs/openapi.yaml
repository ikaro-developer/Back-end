openapi: 3.0.0
info:
  title: API Node + TypeScript
  description: API de gerenciamento de usuários, autenticação, tags e elogios
  version: 1.0.0

servers:
  - url: http://localhost:3333

tags:
  - name: Users
    description: Gerenciamento de usuários
  - name: Auth
    description: Autenticação
  - name: Tags
    description: Gerenciamento de tags
  - name: Compliments
    description: Envio de elogios entre usuários


components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
paths:

  /users:
    post:
      summary: Criar usuário
      tags:
        - Users
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
                - email
                - password
                - admin
              properties:
                name:
                  type: string
                  example: João Silva
                email:
                  type: string
                  example: joao@email.com
                password:
                  type: string
                  example: "123456"
                admin:
                  type: boolean
                  example: false
      responses:
        200:
          description: Usuário criado com sucesso
        400:
          description: Erro na requisição
        500:
          description: Erro interno do servidor

  /login:
    post:
      summary: Autenticar usuário
      description: Retorna um token JWT para acesso à API
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  example: joao@email.com
                password:
                  type: string
                  example: "123456"
      responses:
        200:
          description: Login realizado com sucesso
        401:
          description: Email ou senha incorretos
        500:
          description: Erro interno do servidor

  /tags:
    post:
      summary: Criar tag
      tags:
        - Tags
      security:
      - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                  example: tecnologia
      responses:
        200:
          description: Tag criada com sucesso
        400:
          description: Erro na requisição
        500:
          description: Erro interno do servidor

  /compliments:
    post:
      summary: Enviar elogio para um usuário
      description: Permite que um usuário envie um elogio para outro usuário com uma tag
      tags:
        - Compliments
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - user_sender
                - user_receiver
                - tag_id
                - message
              properties:
                user_sender:
                  type: string
                  example: "uuid-user-sender"
                user_receiver:
                  type: string
                  example: "uuid-user-receiver"
                tag_id:
                  type: string
                  example: "uuid-tag"
                message:
                  type: string
                  example: "Excelente trabalho em equipe!"
      responses:
        200:
          description: Elogio enviado com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: "uuid-compliment"
                  user_sender:
                    type: string
                  user_receiver:
                    type: string
                  tag_id:
                    type: string
                  message:
                    type: string
                  created_at:
                    type: string
                    example: "2026-03-12T10:00:00.000Z"

        400:
          description: Erro na requisição
        500:
          description: Erro interno do servidor